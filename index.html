<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Km Dados – Bac Bo V7</title>
  <style>
    :root {
      --bg: #0a0c16;
      --card: #12152a;
      --card2: #1a1f38;
      --border: #252a4a;
      --player: #3b82f6;
      --banker: #ef4444;
      --tie: #f59e0b;
      --text: #e2e8f0;
      --muted: #64748b;
      --green: #22c55e;
      --purple: #a855f7;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: sans-serif; min-height: 100vh; padding-bottom: 40px; overflow-x: hidden; }
    header { background: #0f1629; border-bottom: 1px solid var(--border); padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .logo-text { font-size: 18px; font-weight: 800; background: linear-gradient(to right, #fff, var(--purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .status-badge { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--green); font-weight: 700; }
    .status-dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; box-shadow: 0 0 8px var(--green); }

    main { max-width: 1100px; margin: 20px auto; padding: 0 15px; display: grid; grid-template-columns: 1fr 340px; gap: 20px; }
    @media (max-width: 900px) { main { grid-template-columns: 1fr; } }

    .signal-card { background: var(--card); border: 2px solid var(--border); border-radius: 24px; padding: 40px 20px; text-align: center; transition: all 0.4s ease; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
    .signal-card.enter-player { border-color: var(--player); background: linear-gradient(180deg, var(--card) 0%, rgba(59,130,246,0.1) 100%); }
    .signal-card.enter-banker { border-color: var(--banker); background: linear-gradient(180deg, var(--card) 0%, rgba(239,68,68,0.1) 100%); }
    .signal-card.wait { border-color: var(--border); }
    .signal-card.surf { border-color: var(--purple); }

    .signal-header { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; }
    .signal-main { font-size: 40px; font-weight: 900; margin: 15px 0; letter-spacing: -1px; }
    .signal-main.player { color: var(--player); text-shadow: 0 0 20px rgba(59,130,246,0.3); }
    .signal-main.banker { color: var(--banker); text-shadow: 0 0 20px rgba(239,68,68,0.3); }
    .signal-main.wait { color: var(--muted); }
    .signal-main.surf { color: var(--purple); text-shadow: 0 0 20px rgba(168,85,247,0.3); }
    .signal-sub { font-size: 15px; color: var(--text); opacity: 0.7; font-weight: 500; }

    .bead-road { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-top: 20px; overflow-x: auto; }
    .bead-grid { display: grid; grid-template-rows: repeat(6, 32px); grid-auto-flow: column; gap: 8px; }
    .bead { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; color: white; animation: popIn 0.3s ease; }
    .bead.P { background: var(--player); box-shadow: inset 0 -3px 0 rgba(0,0,0,0.2); }
    .bead.B { background: var(--banker); box-shadow: inset 0 -3px 0 rgba(0,0,0,0.2); }
    .bead.T { background: var(--tie); color: #000; box-shadow: inset 0 -3px 0 rgba(0,0,0,0.2); }
    @keyframes popIn { 0% { transform: scale(0); } 100% { transform: scale(1); } }

    .accuracy-row { display: flex; gap: 15px; margin-bottom: 20px; }
    .acc-box { flex: 1; background: var(--card2); padding: 20px; border-radius: 18px; text-align: center; border: 1px solid var(--border); }
    .acc-val { font-size: 28px; font-weight: 800; display: block; margin-bottom: 4px; }
    .green { color: var(--green); } .red { color: var(--banker); }
    .acc-label { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; }

    .history-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 20px; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 10px; font-size: 11px; color: var(--muted); border-bottom: 1px solid var(--border); }
    td { padding: 12px 10px; font-size: 13px; border-bottom: 1px solid var(--border); font-weight: 600; }
    .badge { padding: 4px 8px; border-radius: 6px; font-size: 11px; }
    .badge.P { background: rgba(59,130,246,0.15); color: var(--player); }
    .badge.B { background: rgba(239,68,68,0.15); color: var(--banker); }
    .badge.T { background: rgba(245,158,11,0.15); color: var(--tie); }
  </style>
</head>
<body>

<header>
  <div class="logo-text">KM DADOS V7 ULTRA</div>
  <div class="status-badge"><div class="status-dot"></div> EM SINCRONIA</div>
</header>

<main>
  <section>
    <div id="signal-card" class="signal-card wait">
      <p class="signal-header">Monitoramento de Padrões</p>
      <div id="signal-main" class="signal-main wait">ANALISANDO...</div>
      <p id="signal-sub" class="signal-sub">Aguardando gatilho de alta assertividade</p>
    </div>

    <div class="accuracy-row">
      <div class="acc-box"><span id="win" class="acc-val green">0</span><span class="acc-label">Green</span></div>
      <div class="acc-box"><span id="loss" class="acc-val red">0</span><span class="acc-label">Loss</span></div>
    </div>

    <div class="bead-road">
      <div id="beads" class="bead-grid"></div>
    </div>
  </section>

  <section>
    <div class="history-card">
      <p style="font-weight:800; font-size: 14px; margin-bottom:15px; color: var(--muted)">RODADAS RECENTES</p>
      <table>
        <thead><tr><th>HORA</th><th>RESULTADO</th><th>PLACAR</th></tr></thead>
        <tbody id="history"></tbody>
      </table>
    </div>
  </section>
</main>

<script>
  let lastGameId = null;
  let wins = 0; let losses = 0;
  let activeSignal = null; // Armazena o sinal que está esperando green/loss

  async function update() {
    try {
      const r = await fetch('/api/bacbo');
      const data = await r.json();
      if(!data || data.length === 0) return;

      const latest = data[0];
      
      // SINCRONISMO TOTAL: Só processa se o ID da rodada mudar
      if(latest.id !== lastGameId) {
        // Se tínhamos um sinal pendente, verifica se deu Green ou Loss
        if(activeSignal && latest.result !== 'T') {
          if(latest.result === activeSignal) wins++; else losses++;
          document.getElementById('win').innerText = wins;
          document.getElementById('loss').innerText = losses;
          activeSignal = null;
        }
        lastGameId = latest.id;
        render(data);
        analyze(data);
      }
    } catch(e) { console.error("Erro de Sincronismo:", e); }
  }

  function render(data) {
    // Histórico em Tempo Real
    document.getElementById('history').innerHTML = data.slice(0,8).map(i => `
      <tr>
        <td>${i.time}</td>
        <td><span class="badge ${i.result}">${i.result === 'P' ? 'PLAYER' : i.result === 'B' ? 'BANKER' : 'EMPATE'}</span></td>
        <td style="color:var(--muted)">${i.playerScore} - ${i.bankerScore}</td>
      </tr>
    `).join('');

    // Bead Road (60 rodadas)
    document.getElementById('beads').innerHTML = data.slice(0,60).reverse().map(i => `
      <div class="bead ${i.result}">${i.result}</div>
    `).join('');
  }

  function analyze(data) {
    // Filtramos empates para a análise de padrões de cores, mas o empate trava o sinal
    const clean = data.map(i => i.result).filter(o => o !== 'T');
    const lastResult = data[0].result;
    
    // REGRA 1: Se deu EMPATE agora, o app mostra "AGUARDAR" (Sincronismo com o jogo)
    if(lastResult === 'T') {
      setSignal('wait', 'AGUARDAR...', 'Empate detectado. Aguardando saída do padrão.');
      return;
    }

    const last3 = clean.slice(0,3).join('');
    const last4 = clean.slice(0,4).join('');

    // REGRA 2: ANTI-SURF (KTO Estratégia) - Se vier 4 iguais, trava e não manda sinal
    if(last4 === 'PPPP' || last4 === 'BBBB') {
      setSignal('surf', 'AGUARDAR QUEBRA', 'Proteção Anti-Surf: Sequência longa detectada.');
      return;
    }

    // REGRA 3: SNIPER 3X (Só aparece quando o padrão realmente existe)
    if(last3 === 'PPP' || last3 === 'BBB') {
      const target = last3 === 'PPP' ? 'B' : 'P';
      const sideText = target === 'P' ? 'PLAYER' : 'BANKER';
      setSignal(target === 'P' ? 'enter-player' : 'enter-banker', `ENTRAR ${sideText}`, `Sniper 3x: Detectado contra ${last3}`);
      activeSignal = target;
      return;
    }

    // REGRA 4: PADRÃO XADREZ (PBPB ou BPBP)
    if(last4 === 'PBPB' || last4 === 'BPBP') {
      const target = lastResult === 'P' ? 'P' : 'B'; // Segue a cor do último
      const sideText = target === 'P' ? 'PLAYER' : 'BANKER';
      setSignal(target === 'P' ? 'enter-player' : 'enter-banker', `SEGUIR ${sideText}`, 'Padrão Xadrez detectado');
      activeSignal = target;
      return;
    }

    // SE NÃO EXISTE PADRÃO, FICA EM "ANALISANDO" (Não polui a tela toda rodada)
    setSignal('wait', 'ANALISANDO...', 'Aguardando padrão de alta assertividade');
  }

  function setSignal(cls, txt, sub) {
    const card = document.getElementById('signal-card');
    const main = document.getElementById('signal-main');
    card.className = 'signal-card ' + cls;
    main.innerText = txt;
    main.className = 'signal-main ' + (txt.includes('PLAYER') ? 'player' : txt.includes('BANKER') ? 'banker' : (cls==='surf'?'surf':'wait'));
    document.getElementById('signal-sub').innerText = sub;
  }

  // Atualização rápida (3s) para garantir sincronismo com o jogo
  setInterval(update, 3000);
  update();
</script>
</body>
</html>
