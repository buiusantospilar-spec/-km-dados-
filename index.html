<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Km Dados – Bac Bo Sniper</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --border-color: #30363d;
            --accent-blue: #58a6ff;
            --accent-red: #f85149;
            --accent-green: #3fb950;
            --accent-yellow: #d29922;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --btn-idle: #21262d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 15px;
            max-width: 480px;
            margin: 0 auto;
        }

        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .brand h1 { font-size: 22px; color: #ffffff; font-weight: 700; }
        .brand p { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        .live-status {
            background: rgba(63, 185, 80, 0.1);
            border: 1px solid rgba(63, 185, 80, 0.3);
            color: var(--accent-green);
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .dot { width: 8px; height: 8px; background: var(--accent-green); border-radius: 50%; animation: pulse 2s infinite; }

        /* ANALYZING STATE */
        .card-main {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 30px 20px;
            text-align: center;
            margin-bottom: 15px;
            min-height: 160px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        
        .btn-analyzing {
            background: var(--btn-idle);
            border: 1px solid var(--border-color);
            color: #ffffff;
            padding: 14px 45px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .status-msg { color: var(--text-muted); font-size: 13px; }

        /* SIGNAL STATE */
        .card-signal {
            display: none;
            background: var(--card-bg);
            border: 2px solid var(--accent-green);
            border-radius: 12px;
            padding: 25px;
            text-align: center;
            margin-bottom: 15px;
            animation: slideIn 0.3s ease-out;
        }
        .card-signal.active { display: block; }
        .card-signal.banker { border-color: var(--accent-red); }
        .card-signal.player { border-color: var(--accent-blue); }

        .signal-badge {
            font-size: 12px;
            font-weight: 800;
            color: #fff;
            background: var(--accent-green);
            padding: 4px 12px;
            border-radius: 4px;
            display: inline-block;
            margin-bottom: 10px;
        }
        .card-signal.banker .signal-badge { background: var(--accent-red); }
        .card-signal.player .signal-badge { background: var(--accent-blue); }

        .signal-title { font-size: 28px; font-weight: 900; margin-bottom: 5px; }
        .signal-subtitle { font-size: 14px; color: var(--text-muted); }

        /* HISTORY CARD */
        .card-history {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .card-title {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .beads-row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: flex-start;
        }
        .bead {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 800;
            color: #fff;
        }
        .bead.P { background: var(--accent-blue); }
        .bead.B { background: var(--accent-red); }
        .bead.T { background: var(--accent-yellow); }

        /* PREDICTION CARD */
        .card-prediction {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
        }
        .pred-val {
            font-size: 32px;
            font-weight: 900;
            text-align: center;
            margin: 10px 0;
            color: var(--text-muted);
        }
        .pred-val.P { color: var(--accent-blue); }
        .pred-val.B { color: var(--accent-red); }
        
        .conf-bar {
            height: 4px;
            background: #21262d;
            border-radius: 2px;
            overflow: hidden;
            margin: 10px 0;
        }
        .conf-fill { height: 100%; background: var(--accent-green); transition: width 0.5s ease; }
        .conf-text { font-size: 11px; color: var(--text-muted); display: flex; justify-content: space-between; }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }
        @keyframes slideIn {
            from { transform: translateY(10px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="brand">
            <h1>Km Dados</h1>
            <p>Sniper Inteligente</p>
        </div>
        <div class="live-status">
            <div class="dot"></div>
            SISTEMA ATIVO
        </div>
    </div>

    <!-- MAIN INTERFACE (IDLE) -->
    <div id="card-idle" class="card-main">
        <div class="btn-analyzing">Analisando</div>
        <div class="status-msg">Aguardando padrão Sniper KTO...</div>
    </div>

    <!-- SIGNAL DISPLAY -->
    <div id="card-signal" class="card-signal">
        <div class="signal-badge">SINAL CONFIRMADO</div>
        <div class="signal-title" id="sig-text">ENTRAR PLAYER</div>
        <div class="signal-subtitle" id="sig-desc">Fazer até 2 Martingales</div>
    </div>

    <!-- SEPARATE CARD: ÚLTIMAS RODADAS -->
    <div class="card-history">
        <div class="card-title">
            <span>📊</span> ÚLTIMAS RODADAS
        </div>
        <div class="beads-row" id="beads-row">
            <!-- Beads inserted here -->
        </div>
    </div>

    <!-- SEPARATE CARD: PRÓXIMO RESULTADO -->
    <div class="card-prediction">
        <div class="card-title">
            <span>🔮</span> PRÓXIMO RESULTADO
        </div>
        <div class="pred-val" id="pred-val">---</div>
        <div class="conf-bar">
            <div id="conf-fill" class="conf-fill" style="width: 0%"></div>
        </div>
        <div class="conf-text">
            <span>Confiança da Análise</span>
            <span id="conf-pct">0%</span>
        </div>
    </div>

    <script>
        async function update() {
            try {
                const resp = await fetch('/api/bacbo?t=' + Date.now());
                const raw = await resp.json();
                if (!raw || !raw.length) return;

                // SYNC FIX: Reverse the map to match game sequence
                // raw[0] is newest, raw[last] is oldest.
                // We want to slice the most recent ones and reverse them 
                // so the visual bead road shows oldest -> newest (left -> right).
                const history = raw.slice(0, 18).map(item => {
                    const out = (item.data?.result?.outcome || '').toLowerCase();
                    if (out.includes('player')) return 'P';
                    if (out.includes('banker')) return 'B';
                    return 'T';
                }).reverse();

                // Render Beads
                const row = document.getElementById('beads-row');
                row.innerHTML = '';
                history.forEach(res => {
                    const b = document.createElement('div');
                    b.className = `bead ${res}`;
                    b.innerText = res;
                    row.appendChild(b);
                });

                // SNIPER KTO LOGIC (on newest data)
                const recent = raw.slice(0, 5).map(item => {
                    const out = (item.data?.result?.outcome || '').toLowerCase();
                    if (out.includes('player')) return 'P';
                    if (out.includes('banker')) return 'B';
                    return 'T';
                });

                const last3 = recent.slice(0, 3);
                let signal = null;
                let conf = 0;

                // 3x Sniper: 3 in a row -> Bet on opposite
                if (last3.every(v => v === 'P')) { signal = 'B'; conf = 92; }
                else if (last3.every(v => v === 'B')) { signal = 'P'; conf = 92; }
                
                // UI Refresh
                const cardIdle = document.getElementById('card-idle');
                const cardSig = document.getElementById('card-signal');
                const sigText = document.getElementById('sig-text');
                const predVal = document.getElementById('pred-val');
                const confFill = document.getElementById('conf-fill');
                const confPct = document.getElementById('conf-pct');

                if (signal) {
                    cardIdle.style.display = 'none';
                    cardSig.className = `card-signal active ${signal === 'B' ? 'banker' : 'player'}`;
                    sigText.innerText = `ENTRAR ${signal === 'B' ? 'BANKER' : 'PLAYER'}`;
                    predVal.innerText = signal === 'B' ? 'BANKER' : 'PLAYER';
                    predVal.className = `pred-val ${signal}`;
                    confFill.style.width = conf + '%';
                    confPct.innerText = conf + '%';
                } else {
                    cardIdle.style.display = 'flex';
                    cardSig.classList.remove('active');
                    predVal.innerText = 'ANALISANDO';
                    predVal.className = 'pred-val';
                    confFill.style.width = '15%';
                    confPct.innerText = '15%';
                }

            } catch (err) {
                console.error("Update Error:", err);
            }
        }

        setInterval(update, 5000);
        update();
    </script>
</body>
</html>
