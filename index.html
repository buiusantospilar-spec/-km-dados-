<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KM DADOS V7 - KTO</title>
  <style>
    :root {
      --bg: #0a0c16; --card: #12152a; --player: #2563eb; --banker: #dc2626; --tie: #f59e0b; --text: #e2e8f0; --muted: #64748b;
    }
    body { background: var(--bg); color: var(--text); font-family: sans-serif; text-align: center; padding: 15px; }
    .card { background: var(--card); border-radius: 15px; padding: 20px; border: 2px solid #252a4a; max-width: 400px; margin: 0 auto 20px; }
    
    .stats { display: flex; justify-content: space-around; margin-bottom: 15px; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 10px; }
    .stat-val { display: block; font-size: 18px; font-weight: bold; }
    .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; }

    .signal { font-size: 24px; font-weight: bold; margin: 15px 0; padding: 12px; border-radius: 10px; }
    .player { background: var(--player); }
    .banker { background: var(--banker); }
    .wait { background: #252a4a; }
    .surf { background: #a855f7; }

    .history { display: flex; justify-content: center; gap: 6px; flex-wrap: wrap; }
    .dot { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 12px; }
  </style>
</head>
<body>

<div class="card">
  <div class="stats">
    <div><span id="p-perc" class="stat-val" style="color:var(--player)">-</span><span class="stat-label">Player</span></div>
    <div><span id="t-perc" class="stat-val" style="color:var(--tie)">-</span><span class="stat-label">Tie</span></div>
    <div><span id="b-perc" class="stat-val" style="color:var(--banker)">-</span><span class="stat-label">Banker</span></div>
  </div>
  <div id="signal" class="signal wait">ANALISANDO</div>
  <div id="desc" style="font-size: 13px; color: var(--muted)">Sincronizando com Evolution...</div>
</div>

<div class="history" id="history"></div>

<script>
  async function update() {
    try {
      const resp = await fetch('/api/bacbo');
      const data = await resp.json();
      
      if (!data || data.length === 0) return;

      const results = data.map(item => item.result).slice(0, 50);

      // PORCENTAGEM
      const total = results.length;
      const p = Math.round((results.filter(r=>r==='P').length/total)*100);
      const b = Math.round((results.filter(r=>r==='B').length/total)*100);
      const t = Math.round((results.filter(r=>r==='T').length/total)*100);
      document.getElementById('p-perc').innerText = p + '%';
      document.getElementById('b-perc').innerText = b + '%';
      document.getElementById('t-perc').innerText = t + '%';

      // HISTÓRICO
      const histDiv = document.getElementById('history');
      histDiv.innerHTML = '';
      results.slice(0, 14).forEach(res => {
        const dot = document.createElement('div');
        dot.className = 'dot ' + (res === 'P' ? 'player' : res === 'B' ? 'banker' : 'tie');
        dot.innerText = res;
        histDiv.appendChild(dot);
      });

      const sig = document.getElementById('signal');
      const desc = document.getElementById('desc');

      // LÓGICA KTO + PORCENTAGEM
      const last3 = results.slice(0, 3);
      const last4 = results.slice(0, 4);

      if (last4.every(r => r === 'P') || last4.every(r => r === 'B')) {
        sig.innerText = 'AGUARDAR QUEBRA'; sig.className = 'signal surf';
        desc.innerText = 'Alerta Anti-Surf (KTO).'; return;
      }

      if (last3.every(r => r === 'P')) {
        sig.innerText = 'ENTRAR NO BANKER'; sig.className = 'signal banker';
        desc.innerText = 'Sniper 3x | Tendência: ' + p + '% Player'; return;
      }
      if (last3.every(r => r === 'B')) {
        sig.innerText = 'ENTRAR NO PLAYER'; sig.className = 'signal player';
        desc.innerText = 'Sniper 3x | Tendência: ' + b + '% Banker'; return;
      }

      sig.innerText = 'ANALISANDO'; sig.className = 'signal wait';
      desc.innerText = 'Monitorando mesa da Evolution...';

    } catch (e) { console.error(e); }
  }
  setInterval(update, 3000);
  update();
</script>
</body>
</html>
