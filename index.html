<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Km Dados – Bac Bo ao Vivo</title>
  <style>
    :root {
      --bg: #0a0c16;
      --card: #12152a;
      --card2: #1a1f38;
      --border: #252a4a;
      --player: #3b82f6;
      --banker: #ef4444;
      --tie: #f59e0b;
      --text: #e2e8f0;
      --muted: #64748b;
      --green: #22c55e;
      --purple: #a855f7;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      padding-bottom: 40px;
    }
    header {
      background: linear-gradient(135deg, #0f1629 0%, #1a0f3a 100%);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon { font-size: 28px; filter: drop-shadow(0 0 8px rgba(168,85,247,0.8)); }
    .logo-text {
      font-size: 20px; font-weight: 800;
      background: linear-gradient(90deg, #a855f7, #3b82f6);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .logo-sub { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
    .live-badge {
      display: flex; align-items: center; gap: 6px;
      background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.4);
      border-radius: 20px; padding: 5px 12px; font-size: 12px; font-weight: 700; color: #ef4444;
    }
    .live-dot {
      width: 7px; height: 7px; background: #ef4444; border-radius: 50%;
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.8)} }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    @keyframes popIn { 0%{transform:scale(0);opacity:0} 70%{transform:scale(1.2)} 100%{transform:scale(1);opacity:1} }

    .container { max-width: 900px; margin: 0 auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 16px; }

    /* STATUS */
    .status-bar {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 10px 16px; font-size: 12px;
    }
    .status-left { display: flex; align-items: center; gap: 8px; color: var(--muted); }
    .status-ok { color: var(--green); font-weight: 600; }
    .status-err { color: var(--banker); font-weight: 600; }
    .update-timer { color: var(--purple); font-weight: 700; }

    /* PREVISÃO PRINCIPAL */
    .prediction-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 20px; padding: 24px; text-align: center;
      position: relative; overflow: hidden;
    }
    .prediction-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--purple), var(--player), var(--purple));
      background-size: 200% 100%; animation: shimmer 2s linear infinite;
    }
    .pred-label { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: var(--muted); margin-bottom: 10px; }
    .pred-main { font-size: 42px; font-weight: 900; margin: 8px 0; transition: all 0.4s ease; }
    .pred-main.player { color: var(--player); text-shadow: 0 0 30px rgba(59,130,246,0.5); }
    .pred-main.banker { color: var(--banker); text-shadow: 0 0 30px rgba(239,68,68,0.5); }
    .pred-main.tie    { color: var(--tie);    text-shadow: 0 0 30px rgba(245,158,11,0.5); }
    .pred-main.loading { color: var(--muted); font-size: 28px; }
    .pred-confidence { font-size: 13px; color: var(--muted); margin-top: 6px; }
    .pred-confidence span { color: var(--green); font-weight: 700; }
    .pred-pattern {
      margin-top: 14px; padding: 10px 16px;
      background: rgba(168,85,247,0.1); border: 1px solid rgba(168,85,247,0.25);
      border-radius: 12px; font-size: 13px; color: #c084fc; line-height: 1.5;
    }

    /* SINAIS DOS PADRÕES */
    .patterns-grid {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;
    }
    .pattern-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 14px; padding: 14px;
    }
    .pattern-title { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    .pattern-signal {
      font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 6px;
    }
    .signal-dot {
      width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
    }
    .signal-dot.p { background: var(--player); }
    .signal-dot.b { background: var(--banker); }
    .signal-dot.n { background: var(--muted); }
    .pattern-desc { font-size: 11px; color: var(--muted); margin-top: 4px; line-height: 1.4; }

    /* VOTOS */
    .votes-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px; padding: 18px;
    }
    .votes-title { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 12px; }
    .votes-row { display: flex; gap: 10px; }
    .vote-bar-wrap { flex: 1; text-align: center; }
    .vote-label { font-size: 12px; font-weight: 700; margin-bottom: 6px; }
    .vote-label.p { color: var(--player); }
    .vote-label.b { color: var(--banker); }
    .vote-track { height: 8px; background: var(--card2); border-radius: 4px; overflow: hidden; margin-bottom: 4px; }
    .vote-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
    .vote-fill.p { background: linear-gradient(90deg, var(--player), #60a5fa); }
    .vote-fill.b { background: linear-gradient(90deg, var(--banker), #f87171); }
    .vote-pct { font-size: 11px; color: var(--muted); }

    /* BEAD ROAD */
    .section-title {
      font-size: 12px; text-transform: uppercase; letter-spacing: 1.5px;
      color: var(--muted); margin-bottom: 12px;
      display: flex; align-items: center; gap: 8px;
    }
    .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .bead-road { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 16px; }
    .beads { display: flex; flex-wrap: wrap; gap: 6px; }
    .bead {
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 800; transition: all 0.3s ease; flex-shrink: 0;
    }
    .bead.P { background: rgba(59,130,246,0.2); border: 2px solid var(--player); color: var(--player); }
    .bead.B { background: rgba(239,68,68,0.2); border: 2px solid var(--banker); color: var(--banker); }
    .bead.T { background: rgba(245,158,11,0.2); border: 2px solid var(--tie); color: var(--tie); }
    .bead.new-result { animation: popIn 0.4s ease; }

    /* SINAL DE ENTRADA */
    .signal-card {
      border-radius: 20px; padding: 24px; text-align: center;
      border: 2px solid; position: relative; overflow: hidden;
    }
    .signal-card.enter-player {
      background: rgba(34,197,94,0.12); border-color: var(--green);
      box-shadow: 0 0 30px rgba(34,197,94,0.3);
    }
    .signal-card.enter-banker {
      background: rgba(34,197,94,0.12); border-color: var(--green);
      box-shadow: 0 0 30px rgba(34,197,94,0.3);
    }
    .signal-card.wait {
      background: rgba(245,158,11,0.08); border-color: var(--tie);
    }
    .signal-main { font-size: 36px; font-weight: 900; margin-bottom: 6px; }
    .signal-main.go   { color: var(--green); }
    .signal-main.wait { color: var(--tie); }
    .signal-sub { font-size: 14px; color: var(--muted); }
    @keyframes glow { 0%,100%{box-shadow:0 0 20px rgba(34,197,94,0.3)} 50%{box-shadow:0 0 50px rgba(34,197,94,0.7)} }
    .signal-card.enter-player, .signal-card.enter-banker { animation: glow 1.5s ease-in-out infinite; }

    .disclaimer { text-align: center; font-size: 11px; color: var(--muted); padding: 8px 16px; border-top: 1px solid var(--border); margin-top: 4px; }

    @media (max-width: 500px) {
      .bead { width: 30px; height: 30px; font-size: 10px; }
      .pred-main { font-size: 32px; }
      .patterns-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-icon">🎲</span>
    <div>
      <div class="logo-text">Km Dados</div>
      <div class="logo-sub">Bac Bo ao Vivo</div>
    </div>
  </div>
  <div class="live-badge">
    <div class="live-dot"></div>
    AO VIVO
  </div>
</header>

<div class="container">

  <!-- STATUS -->
  <div class="status-bar">
    <div class="status-left">
      <span>📡 Evolution Gaming</span>
      <span id="status-text" class="status-ok">ONLINE</span>
    </div>
    <div>
      <span style="color:var(--muted)">Sincronizado</span>
    </div>
  </div>

  <!-- SINAL DE ENTRADA -->
  <div class="signal-card wait" id="signal-card">
    <div class="signal-main wait" id="signal-main">⏳ AGUARDAR</div>
    <div class="signal-sub" id="signal-sub">Analisando padrões...</div>
  </div>

  <!-- ÚLTIMAS RODADAS -->
  <div class="bead-road">
    <div class="section-title">🎲 Últimas rodadas ao vivo</div>
    <div class="beads" id="beads-container"></div>
  </div>

  <!-- PREVISÃO PRINCIPAL -->
  <div class="prediction-card">
    <div class="pred-label">🔮 Próximo resultado previsto</div>
    <div class="pred-main loading" id="pred-result">---</div>
    <div class="pred-confidence" id="pred-conf">Analisando...</div>
    <div class="pred-pattern" id="pred-pattern">Aguardando dados...</div>
  </div>

  <!-- CONCENTO -->
  <div class="votes-card">
    <div class="votes-title">📊 Consenso dos Padrões</div>
    <div class="votes-row">
      <div class="vote-bar-wrap">
        <div class="vote-label p">PLAYER</div>
        <div class="vote-track"><div class="vote-fill p" id="vote-p-fill" style="width: 50%"></div></div>
        <div class="vote-pct" id="vote-p-pct">50%</div>
      </div>
      <div class="vote-bar-wrap">
        <div class="vote-label b">BANKER</div>
        <div class="vote-track"><div class="vote-fill b" id="vote-b-fill" style="width: 50%"></div></div>
        <div class="vote-pct" id="vote-b-pct">50%</div>
      </div>
    </div>
  </div>

  <div class="disclaimer">Atenção: Sistema sincronizado com a Evolution Gaming.</div>

</div>

<script>
    let lastId = "";
    const API_URL = 'https://api-cs.casino.org/svc-evolution-game-events/api/bacbo';

    async function update() {
        try {
            const resp = await fetch(API_URL);
            const json = await resp.json();
            
            if (json && json.data && json.data.last_results) {
                const results = json.data.last_results;
                const currentId = results[0].id;
                
                if (currentId !== lastId) {
                    lastId = currentId;
                    
                    // Atualiza Bolinhas
                    const container = document.getElementById('beads-container');
                    container.innerHTML = '';
                    results.slice(0, 18).forEach((res, idx) => {
                        const bead = document.createElement('div');
                        bead.className = 'bead ' + res.result + (idx === 0 ? ' new-result' : '');
                        bead.innerText = res.result;
                        container.appendChild(bead);
                    });

                    // Lógica de Sinal (Sniper 3x)
                    const sCard = document.getElementById('signal-card');
                    const sMain = document.getElementById('signal-main');
                    const sSub = document.getElementById('signal-sub');
                    const pRes = document.getElementById('pred-result');
                    const pConf = document.getElementById('pred-conf');
                    const pPat = document.getElementById('pred-pattern');
                    const vP = document.getElementById('vote-p-fill');
                    const vB = document.getElementById('vote-b-fill');
                    const vPPct = document.getElementById('vote-p-pct');
                    const vBPct = document.getElementById('vote-b-pct');

                    const r = results.map(x => x.result);
                    
                    if (r[0] === r[1] && r[1] === r[2] && r[0] !== 'T') {
                        const target = r[0] === 'P' ? 'BANKER' : 'PLAYER';
                        sCard.className = 'signal-card enter-' + target.toLowerCase();
                        sMain.className = 'signal-main go';
                        sMain.innerText = 'ENTRAR ' + target;
                        sSub.innerText = 'Padrão Sniper Confirmado!';
                        
                        pRes.innerText = target;
                        pRes.className = 'pred-main ' + target.toLowerCase();
                        pConf.innerHTML = 'Confiança: <span>96%</span>';
                        pPat.innerText = 'Estratégia: Quebra de sequência em ' + target;
                        
                        if(target === 'PLAYER') { vP.style.width='80%'; vB.style.width='20%'; vPPct.innerText='80%'; vBPct.innerText='20%'; }
                        else { vP.style.width='20%'; vB.style.width='80%'; vPPct.innerText='20%'; vBPct.innerText='80%'; }
                    } else {
                        sCard.className = 'signal-card wait';
                        sMain.className = 'signal-main wait';
                        sMain.innerText = '⏳ AGUARDAR';
                        sSub.innerText = 'Analisando próxima rodada...';
                        
                        pRes.innerText = '---';
                        pRes.className = 'pred-main loading';
                        pConf.innerText = 'Analisando força...';
                        pPat.innerText = 'Aguardando padrão Sniper 3x.';
                        vP.style.width='50%'; vB.style.width='50%'; vPPct.innerText='50%'; vBPct.innerText='50%';
                    }
                }
            }
        } catch (e) {
            console.error(e);
        }
    }

    setInterval(update, 2000);
    update();
</script>

</body>
</html>
