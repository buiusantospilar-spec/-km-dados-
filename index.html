<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Km Dados – Bac Bo ao Vivo</title>
    <style>
        :root {
            --bg: #030508;
            --card: #0b0f1a;
            --border: #1a1f2e;
            --player: #3b82f6;
            --banker: #ef4444;
            --tie: #f59e0b;
            --text: #ffffff;
            --muted: #64748b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-width: 500px;
            margin: 0 auto;
        }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .logo { display: flex; align-items: center; gap: 8px; font-weight: 800; font-size: 20px; }
        .live-badge { color: #ef4444; font-size: 11px; font-weight: 700; display: flex; align-items: center; gap: 4px; border: 1px solid rgba(239,68,68,0.3); padding: 2px 8px; border-radius: 20px; }
        .live-dot { width: 6px; height: 6px; background: #ef4444; border-radius: 50%; }

        .status-bar { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); padding: 0 4px; }
        .status-ok { color: #10b981; font-weight: 600; }

        /* CARD ANALISANDO / ENTRAR - EXATAMENTE IGUAL À FOTO */
        .prediction-card {
            background: #111827; /* Azul escuro/cinza da foto */
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 30px 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        .prediction-card.signal-active { background: #059669; } /* Verde ENTRAR */

        .pred-status { font-size: 18px; font-weight: 800; letter-spacing: 1px; }
        .pred-msg { font-size: 13px; color: #9ca3af; }
        .force-bar {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            margin-top: 8px;
            overflow: hidden;
        }
        .force-fill { height: 100%; background: #ffffff; width: 15%; transition: width 0.5s; }
        .force-text { font-size: 11px; color: #9ca3af; margin-top: 4px; }

        /* ULTIMAS RODADAS - CARD SEPARADO */
        .section-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
        }
        .section-title { font-size: 11px; color: var(--muted); text-transform: uppercase; margin-bottom: 12px; font-weight: 700; letter-spacing: 0.5px; }
        
        .beads-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
        }
        .bead {
            height: 38px;
            width: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 800;
            border: 2px solid transparent;
        }
        .bead.P { background: rgba(59,130,246,0.1); border-color: var(--player); color: var(--player); }
        .bead.B { background: rgba(239,68,68,0.1); border-color: var(--banker); color: var(--banker); }
        .bead.T { background: rgba(245,158,11,0.1); border-color: var(--tie); color: var(--tie); }

        .stats-row { display: flex; justify-content: space-between; margin-top: 4px; }
        .stat-item { flex: 1; text-align: center; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px; }
        .stat-val { font-size: 20px; font-weight: 800; }
        .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; margin-top: 2px; }
        
    </style>
</head>
<body>

<header class="header">
    <div class="logo">🎲 Km Dados</div>
    <div class="live-badge"><div class="live-dot"></div> AO VIVO</div>
</header>

<div class="status-bar">
    <div>📡 Evolution Gaming: <span class="status-ok">ONLINE</span></div>
    <div>Atualiza em: <span id="timer" style="color:var(--player); font-weight:700;">--</span></div>
</div>

<!-- CARD PRINCIPAL IGUAL À FOTO -->
<div class="prediction-card" id="main-card">
    <div class="pred-status" id="pred-status">ANALISANDO...</div>
    <div class="pred-msg" id="pred-msg">Aguardando confirmação do padrão...</div>
    <div class="force-bar"><div class="force-fill" id="force-fill"></div></div>
    <div class="force-text" id="force-text">ANÁLISE DE FORÇA: 0/8</div>
</div>

<div class="section-card">
    <div class="section-title">📊 Últimas Rodadas</div>
    <div class="beads-grid" id="beads-grid"></div>
</div>

<div class="stats-row">
    <div class="stat-item">
        <div class="stat-val" id="p-count" style="color:var(--player)">0</div>
        <div class="stat-label">Player</div>
    </div>
    <div class="stat-item" style="margin: 0 8px;">
        <div class="stat-val" id="b-count" style="color:var(--banker)">0</div>
        <div class="stat-label">Banker</div>
    </div>
    <div class="stat-item">
        <div class="stat-val" id="t-count" style="color:var(--tie)">0</div>
        <div class="stat-label">Tie</div>
    </div>
</div>

<script>
    const API_URL = '/api/bacbo';
    let countdown = 15;

    async function update() {
        try {
            const resp = await fetch(API_URL + '?t=' + Date.now());
            const raw = await resp.json();
            if(!raw || !raw.length) return;

            // Sincronismo total: mapear e garantir ordem correta (mais antigo para mais novo para o grid)
            const history = raw.map(item => {
                const out = (item.data?.result?.outcome || '').toLowerCase();
                if(out.includes('player')) return 'P';
                if(out.includes('banker')) return 'B';
                if(out.includes('tie')) return 'T';
                return 'T';
            }).slice(0, 18).reverse();

            // 1. Grid de bolinhas
            const grid = document.getElementById('beads-grid');
            grid.innerHTML = '';
            history.forEach(res => {
                const b = document.createElement('div');
                b.className = `bead ${res}`;
                b.innerText = res;
                grid.appendChild(b);
            });

            // 2. Estatísticas das últimas 18
            document.getElementById('p-count').innerText = history.filter(x => x === 'P').length;
            document.getElementById('b-count').innerText = history.filter(x => x === 'B').length;
            document.getElementById('t-count').innerText = history.filter(x => x === 'T').length;

            // 3. Lógica Sniper 3x KTO
            const last3 = [...history].reverse().slice(0, 3);
            const mainCard = document.getElementById('main-card');
            const pStatus = document.getElementById('pred-status');
            const pMsg = document.getElementById('pred-msg');
            const fFill = document.getElementById('force-fill');
            const fText = document.getElementById('force-text');

            if(last3.length === 3 && last3.every(x => x === last3[0]) && last3[0] !== 'T') {
                const target = last3[0] === 'P' ? 'BANKER' : 'PLAYER';
                mainCard.classList.add('signal-active');
                pStatus.innerHTML = '✅ ENTRAR - ' + target;
                pMsg.innerText = 'Padrão Sniper 3x Confirmado!';
                fFill.style.width = '85%';
                fText.innerText = 'ANÁLISE DE FORÇA: 7/8';
            } else {
                mainCard.classList.remove('signal-active');
                pStatus.innerText = 'ANALISANDO...';
                pMsg.innerText = 'Aguardando confirmação do padrão...';
                fFill.style.width = '15%';
                fText.innerText = 'ANÁLISE DE FORÇA: 0/8';
            }

        } catch(e) { console.error(e); }
    }

    setInterval(() => {
        countdown--;
        if(countdown <= 0) { update(); countdown = 15; }
        document.getElementById('timer').innerText = countdown + 's';
    }, 1000);
    update();
</script>
</body>
</html>
