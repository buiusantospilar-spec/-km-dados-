<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KM DADOS V7 PRO - KTO</title>
  <style>
    :root {
      --bg: #0f172a; --card: #1e293b; --player: #2563eb; --banker: #dc2626; --tie: #eab308; --text: #f8fafc; --muted: #94a3b8;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding: 15px; }
    .card { background: var(--card); border-radius: 20px; padding: 25px; border: 2px solid #334155; max-width: 450px; margin: 0 auto 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
    .signal { font-size: 26px; font-weight: bold; margin: 15px 0; padding: 12px; border-radius: 10px; text-transform: uppercase; letter-spacing: 1px; }
    .player { background: var(--player); box-shadow: 0 0 15px rgba(37, 99, 235, 0.5); }
    .banker { background: var(--banker); box-shadow: 0 0 15px rgba(220, 38, 38, 0.5); }
    .wait { background: #334155; }
    .surf { background: #a855f7; }
    
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin: 20px 0; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px; }
    .stat-item { display: flex; flex-direction: column; }
    .stat-val { font-size: 18px; font-weight: bold; }
    .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; margin-top: 4px; }
    
    .history { display: flex; justify-content: center; gap: 6px; flex-wrap: wrap; margin-top: 15px; }
    .dot { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 12px; border: 2px solid rgba(255,255,255,0.1); }
    
    .prob-bar { height: 8px; background: #334155; border-radius: 4px; margin: 10px 0; overflow: hidden; display: flex; }
    .p-bar { background: var(--player); height: 100%; transition: width 0.5s; }
    .b-bar { background: var(--banker); height: 100%; transition: width 0.5s; }
  </style>
</head>
<body>

<div class="card">
  <h2 style="color: var(--muted); font-size: 14px; margin-bottom: 10px;">INTELIGÊNCIA KTO ANALITYCS</h2>
  
  <div class="prob-bar">
    <div id="p-bar" class="p-bar" style="width: 50%"></div>
    <div id="b-bar" class="b-bar" style="width: 50%"></div>
  </div>

  <div class="stats-grid">
    <div class="stat-item">
      <span id="p-perc" class="stat-val" style="color: var(--player)">50%</span>
      <span class="stat-label">Player</span>
    </div>
    <div class="stat-item">
      <span id="t-perc" class="stat-val" style="color: var(--tie)">0%</span>
      <span class="stat-label">Tie</span>
    </div>
    <div class="stat-item">
      <span id="b-perc" class="stat-val" style="color: var(--banker)">50%</span>
      <span class="stat-label">Banker</span>
    </div>
  </div>

  <div id="signal" class="signal wait">ANALISANDO...</div>
  <div id="desc" style="font-size: 14px; color: var(--muted)">Calculando probabilidades numéricas...</div>
</div>

<div class="history" id="history"></div>

<script>
  async function update() {
    try {
      const resp = await fetch('/api/bacbo');
      const data = await resp.json();
      
      const results = data.map(item => {
        const outcome = item.data?.result?.outcome || '';
        if (outcome.includes('Player')) return 'P';
        if (outcome.includes('Banker')) return 'B';
        return 'T';
      }).slice(0, 50);

      // CÁLCULO DE PORCENTAGEM (Últimas 50 rodadas)
      const total = results.length;
      const pCount = results.filter(r => r === 'P').length;
      const bCount = results.filter(r => r === 'B').length;
      const tCount = results.filter(r => r === 'T').length;

      const pPerc = Math.round((pCount / total) * 100) || 0;
      const bPerc = Math.round((bCount / total) * 100) || 0;
      const tPerc = Math.round((tCount / total) * 100) || 0;

      document.getElementById('p-perc').innerText = pPerc + '%';
      document.getElementById('b-perc').innerText = bPerc + '%';
      document.getElementById('t-perc').innerText = tPerc + '%';
      document.getElementById('p-bar').style.width = pPerc + '%';
      document.getElementById('b-bar').style.width = bPerc + '%';

      // Histórico Visual
      const histDiv = document.getElementById('history');
      histDiv.innerHTML = '';
      results.slice(0, 18).forEach(res => {
        const dot = document.createElement('div');
        dot.className = 'dot ' + (res === 'P' ? 'player' : res === 'B' ? 'banker' : 'tie');
        dot.innerText = res;
        histDiv.appendChild(dot);
      });

      const sig = document.getElementById('signal');
      const desc = document.getElementById('desc');

      // ESTRATÉGIA KTO APRIMORADA
      if (results.length >= 4) {
        const last4 = results.slice(0, 4);
        const last3 = results.slice(0, 3);
        
        // Anti-Surf (4+ iguais)
        if (last4.every(r => r === 'P') || last4.every(r => r === 'B')) {
          sig.innerText = 'AGUARDAR QUEBRA';
          sig.className = 'signal surf';
          desc.innerText = 'Probabilidade de Surf alta. Protegendo banca.';
          return;
        }

        // Sniper 3x KTO
        if (last3.every(r => r === 'P')) {
          sig.innerText = 'ENTRAR NO BANKER';
          sig.className = 'signal banker';
          desc.innerText = 'Sniper 3x: ' + pPerc + '% de tendência Player.';
          return;
        }
        if (last3.every(r => r === 'B')) {
          sig.innerText = 'ENTRAR NO PLAYER';
          sig.className = 'signal player';
          desc.innerText = 'Sniper 3x: ' + bPerc + '% de tendência Banker.';
          return;
        }

        // Xadrez
        if (last4[0] !== last4[1] && last4[1] === last4[3] && last4[0] === last4[2] && last4[0] !== 'T' && last4[1] !== 'T') {
          const next = last4[0] === 'P' ? 'BANKER' : 'PLAYER';
          sig.innerText = 'ENTRAR NO ' + next;
          sig.className = 'signal ' + next.toLowerCase();
          desc.innerText = 'Padrão Xadrez Detectado.';
          return;
        }
      }

      sig.innerText = 'ANALISANDO';
      sig.className = 'signal wait';
      desc.innerText = 'Aguardando gatilho numérico...';

    } catch (e) { console.error(e); }
  }

  setInterval(update, 5000);
  update();
</script>
</body>
</html>
