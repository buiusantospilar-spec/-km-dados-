<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Km Dados – Bac Bo Sniper</title>
    <style>
        :root {
            --bg-color: #030508;
            --card-bg: #0b0f1a;
            --border-color: #1a1f2e;
            --player: #3b82f6;
            --banker: #ef4444;
            --tie: #f59e0b;
            --text-main: #ffffff;
            --text-muted: #64748b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: var(--bg-color); color: var(--text-main); padding: 10px; max-width: 450px; margin: 0 auto; }

        /* HEADER IGUAL À FOTO */
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding: 5px; }
        .logo { display: flex; align-items: center; gap: 8px; }
        .logo-icon { font-size: 24px; }
        .logo-text { font-weight: 800; font-size: 18px; background: linear-gradient(90deg, #a855f7, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .live-badge { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.4); color: #ef4444; font-size: 10px; font-weight: 800; padding: 4px 10px; border-radius: 20px; display: flex; align-items: center; gap: 5px; }
        .dot { width: 6px; height: 6px; background: #ef4444; border-radius: 50%; animation: pulse 1.2s infinite; }

        /* CARD PRINCIPAL (BOTÃO GRANDE) */
        .card-main { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 16px; padding: 25px 15px; text-align: center; margin-bottom: 12px; }
        .btn-status { display: inline-block; padding: 15px 40px; border-radius: 8px; font-size: 20px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; color: #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .btn-status.analyzing { background: #1a1f38; border: 1px solid #252a4a; color: #64748b; }
        .btn-status.signal-p { background: #10b981; border: 1px solid #059669; }
        .btn-status.signal-b { background: #10b981; border: 1px solid #059669; }
        .status-msg { margin-top: 15px; font-size: 12px; color: var(--text-muted); }

        /* SEÇÃO: ÚLTIMAS RODADAS */
        .section-box { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 16px; padding: 15px; margin-bottom: 12px; }
        .section-header { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .beads-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; }
        .bead { width: 100%; aspect-ratio: 1; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 900; color: #fff; }
        .bead.P { background: var(--player); border: 3px solid rgba(59, 130, 246, 0.3); }
        .bead.B { background: var(--banker); border: 3px solid rgba(239, 68, 68, 0.3); }
        .bead.T { background: var(--tie); border: 3px solid rgba(245, 158, 11, 0.3); }

        /* SEÇÃO: PRÓXIMO RESULTADO (IGUAL À FOTO) */
        .pred-box { text-align: center; padding: 20px 10px; }
        .pred-val { font-size: 36px; font-weight: 900; color: var(--text-muted); margin-bottom: 10px; }
        .pred-val.P { color: var(--player); }
        .pred-val.B { color: var(--banker); }
        .forca-box { margin-top: 10px; }
        .forca-bar { height: 6px; background: #1a1f38; border-radius: 3px; overflow: hidden; margin: 8px 0; }
        .forca-fill { height: 100%; background: #10b981; transition: width 0.5s; }
        .forca-text { display: flex; justify-content: space-between; font-size: 10px; color: var(--text-muted); }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <span class="logo-icon">🎲</span>
            <div class="logo-text">Km Dados</div>
        </div>
        <div class="live-badge">
            <div class="dot"></div> AO VIVO
        </div>
    </header>

    <div class="card-main">
        <div id="btn-status" class="btn-status analyzing">Analisando</div>
        <div class="status-msg" id="status-msg">Aguardando confirmação do sinal...</div>
    </div>

    <div class="section-box">
        <div class="section-header">📊 ÚLTIMAS RODADAS</div>
        <div class="beads-grid" id="beads-grid">
            <!-- 18 bolinhas -->
        </div>
    </div>

    <div class="section-box">
        <div class="section-header">🔮 PRÓXIMO RESULTADO</div>
        <div class="pred-box">
            <div class="pred-val" id="pred-val">---</div>
            <div class="forca-box">
                <div class="forca-bar"><div id="forca-fill" class="forca-fill" style="width: 15%"></div></div>
                <div class="forca-text">
                    <span>FORÇA DA ANÁLISE</span>
                    <span id="forca-val">0/8</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function update() {
            try {
                // Sincronismo forçado com o jogo
                const resp = await fetch('/api/bacbo?nocache=' + Date.now());
                const raw = await resp.json();
                if (!raw || !raw.length) return;

                // Mapeia os 18 mais recentes e inverte para ficar igual à tela do jogo (mais novo no fim)
                const history = raw.slice(0, 18).map(item => {
                    const out = (item.data?.result?.outcome || '').toLowerCase();
                    if (out.includes('player')) return 'P';
                    if (out.includes('banker')) return 'B';
                    return 'T';
                }).reverse();

                // Renderiza as 18 bolinhas no grid 6x3
                const grid = document.getElementById('beads-grid');
                grid.innerHTML = '';
                history.forEach(res => {
                    const b = document.createElement('div');
                    b.className = `bead ${res}`;
                    b.innerText = res;
                    grid.appendChild(b);
                });

                // Lógica de Sinal Sniper 3x (Pega os 3 mais recentes da API)
                const recent = raw.slice(0, 3).map(item => {
                    const out = (item.data?.result?.outcome || '').toLowerCase();
                    if (out.includes('player')) return 'P';
                    if (out.includes('banker')) return 'B';
                    return 'T';
                });

                let signal = null;
                if (recent[0] !== 'T' && recent.every(v => v === recent[0])) {
                    signal = recent[0] === 'P' ? 'B' : 'P';
                }

                // Atualiza UI
                const btn = document.getElementById('btn-status');
                const msg = document.getElementById('status-msg');
                const pred = document.getElementById('pred-val');
                const fill = document.getElementById('forca-fill');
                const fVal = document.getElementById('forca-val');

                if (signal) {
                    btn.className = 'btn-status signal-' + signal.toLowerCase();
                    btn.innerText = '✅ ENTRAR ' + (signal === 'P' ? 'PLAYER' : 'BANKER');
                    msg.innerText = 'Sinal confirmado! Fazer até 2 Martingales.';
                    pred.innerText = signal === 'P' ? 'PLAYER' : 'BANKER';
                    pred.className = 'pred-val ' + signal;
                    fill.style.width = '85%';
                    fVal.innerText = '7/8';
                } else {
                    btn.className = 'btn-status analyzing';
                    btn.innerText = 'Analisando';
                    msg.innerText = 'Aguardando confirmação do sinal...';
                    pred.innerText = '---';
                    pred.className = 'pred-val';
                    fill.style.width = '15%';
                    fVal.innerText = '0/8';
                }

            } catch (e) { console.error(e); }
        }

        setInterval(update, 3000);
        update();
    </script>
</body>
</html>
