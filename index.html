<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAC BO NEURAL V10.2</title>
    <style>
        :root { --bg: #05070a; --accent: #00f2ff; --p: #007bff; --b: #ff4d4d; --t: #00ff88; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; text-align: center; margin: 0; padding: 20px; }
        .card { background: #0d1117; border: 1px solid var(--accent); border-radius: 20px; padding: 20px; max-width: 400px; margin: auto; box-shadow: 0 0 20px rgba(0,242,255,0.2); }
        .status { color: var(--accent); font-size: 0.9rem; margin: 10px 0; }
        .signal-box { background: #161b22; border-radius: 15px; padding: 20px; margin: 20px 0; border: 1px solid #30363d; }
        .signal-text { font-size: 1.8rem; font-weight: bold; margin: 10px 0; text-transform: uppercase; }
        .beads { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-top: 20px; }
        .bead { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; color: white; }
        .P { background: var(--p); box-shadow: 0 0 10px var(--p); }
        .B { background: var(--b); box-shadow: 0 0 10px var(--b); }
        .T { background: var(--t); box-shadow: 0 0 10px var(--t); }
    </style>
</head>
<body>
    <div class="card">
        <h1 style="font-size: 1.2rem; letter-spacing: 2px;">NEURAL SNIPER V10.2</h1>
        <div id="status" class="status">● AGUARDANDO DADOS...</div>
        
        <div class="signal-box">
            <div id="instruction" style="color: #8b949e; font-size: 0.8rem;">ESTRATÉGIA: ANALISANDO CICLOS</div>
            <div id="signal" class="signal-text">AGUARDE...</div>
        </div>

        <div id="beads" class="beads"></div>
    </div>

    <script>
        async function check() {
            try {
                const r = await fetch('/api/bacbo');
                const data = await r.json();
                const status = document.getElementById('status');
                const beadsDiv = document.getElementById('beads');
                const signal = document.getElementById('signal');
                const inst = document.getElementById('instruction');

                if (data && data.length > 0) {
                    status.innerHTML = "● <span style='color:#00ff88'>LIVE - CONECTADO</span>";
                    beadsDiv.innerHTML = '';
                    
                    data.slice(0, 12).forEach(d => {
                        const b = document.createElement('div');
                        b.className = `bead ${d.result}`;
                        b.innerText = d.result;
                        beadsDiv.appendChild(b);
                    });

                    // Lógica Sniper v10.2
                    const last3 = data.slice(0, 3).map(d => d.result).join('');
                    if (last3 === 'PPP') {
                        signal.innerText = "ENTRAR NO VERMELHO";
                        signal.style.color = "#ff4d4d";
                        inst.innerText = "ALTA PROBABILIDADE DE QUEBRA";
                    } else if (last3 === 'BBB') {
                        signal.innerText = "ENTRAR NO AZUL";
                        signal.style.color = "#007bff";
                        inst.innerText = "ALTA PROBABILIDADE DE QUEBRA";
                    } else if (data[0].result === 'T') {
                        signal.innerText = "PÓS EMPATE: AGUARDE";
                        signal.style.color = "#00ff88";
                        inst.innerText = "AGUARDANDO CONFIRMAÇÃO DE COR";
                    } else {
                        signal.innerText = "ANALISANDO...";
                        signal.style.color = "white";
                        inst.innerText = "ESCANEANDO COMPORTAMENTO DA MESA";
                    }
                }
            } catch (e) {
                status.innerText = "● ERRO DE SINCRONISMO";
            }
        }
        setInterval(check, 2500);
        check();
    </script>
</body>
</html>
