<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Km Dados – Bac Bo V7</title>
  <style>
    :root {
      --bg: #0a0c16;
      --card: #12152a;
      --border: #252a4a;
      --player: #3b82f6;
      --banker: #ef4444;
      --tie: #f59e0b;
      --text: #e2e8f0;
      --muted: #64748b;
      --green: #22c55e;
      --purple: #a855f7;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 15px; }
    
    header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .logo { font-weight: 900; font-size: 18px; color: #fff; }
    .logo span { color: #a855f7; }
    .status { font-size: 10px; font-weight: 700; color: var(--green); display: flex; align-items: center; gap: 5px; }
    .dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; box-shadow: 0 0 5px var(--green); }

    .signal-card {
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 20px;
      padding: 30px;
      text-align: center;
      margin-bottom: 20px;
      transition: all 0.3s ease;
    }
    .signal-card.surf { border-color: var(--purple); background: rgba(168,85,247,0.05); }
    .signal-card.player { border-color: var(--player); }
    .signal-card.banker { border-color: var(--banker); }

    .signal-title { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
    .signal-main { font-size: 40px; font-weight: 900; margin: 15px 0; letter-spacing: -1px; }
    .signal-main.player { color: var(--player); }
    .signal-main.banker { color: var(--banker); }
    .signal-main.wait { color: var(--muted); }
    .signal-main.surf { color: var(--purple); }
    .signal-desc { font-size: 14px; color: var(--text); opacity: 0.7; }

    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
    .stat-box { background: var(--card); border: 1px solid var(--border); border-radius: 15px; padding: 15px; text-align: center; }
    .stat-num { font-size: 24px; font-weight: 900; margin-bottom: 5px; }
    .stat-num.green { color: var(--green); }
    .stat-num.red { color: var(--banker); }
    .stat-label { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; }

    .bead-road { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 20px; overflow-x: auto; }
    .bead-grid { display: grid; grid-template-rows: repeat(6, 30px); grid-auto-flow: column; gap: 5px; }
    .bead { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; color: #fff; }
    .bead.P { background: var(--player); }
    .bead.B { background: var(--banker); }
    .bead.T { background: var(--tie); color: #000; }
  </style>
</head>
<body>

<header>
  <div class="logo">KM DADOS <span>V7 ULTRA</span></div>
  <div class="status"><div class="dot"></div> EM SINCRONIA</div>
</header>

<main>
  <div id="signal-card" class="signal-card">
    <div class="signal-title">Monitoramento de Padrões</div>
    <div id="signal-main" class="signal-main wait">ANALISANDO...</div>
    <div id="signal-desc" class="signal-desc">Aguardando leitura completa da mesa...</div>
  </div>

  <div class="stats-grid">
    <div class="stat-box">
      <div id="count-green" class="stat-num green">0</div>
      <div class="stat-label">Green</div>
    </div>
    <div class="stat-box">
      <div id="count-red" class="stat-num red">0</div>
      <div class="stat-label">Loss</div>
    </div>
  </div>

  <div class="bead-road">
    <div id="beads-container" class="bead-grid"></div>
  </div>
</main>

<script>
  let gameHistory = [];
  let score = { g: 0, l: 0 };

  async function update() {
    try {
      const r = await fetch('/api/bacbo');
      const data = await r.json();
      if (!data || data.length === 0) return;

      gameHistory = data;
      renderBeads();
      analyze();
    } catch(e) { console.error(e); }
  }

  function renderBeads() {
    const container = document.getElementById('beads-container');
    container.innerHTML = gameHistory.slice(0, 60).map(h => `
      <div class="bead ${h.result}">${h.result}</div>
    `).join('');
  }

  function analyze() {
    const card = document.getElementById('signal-card');
    const main = document.getElementById('signal-main');
    const desc = document.getElementById('signal-desc');

    // Filtra empates para análise de padrões de cor
    const noTies = gameHistory.filter(h => h.result !== 'T').map(h => h.result);
    const lastResult = gameHistory[0].result;

    // 1. REGRA DO EMPATE (SYNC TOTAL)
    if (lastResult === 'T') {
      card.className = 'signal-card';
      main.innerText = 'AGUARDAR...';
      main.className = 'signal-main wait';
      desc.innerText = 'Empate detectado. Aguardando saída do padrão.';
      return;
    }

    const streak4 = noTies.slice(0, 4).join('');
    const streak3 = noTies.slice(0, 3).join('');

    // 2. ANTI-SURF (ESTRATÉGIA KTO)
    if (streak4 === 'PPPP' || streak4 === 'BBBB') {
      card.className = 'signal-card surf';
      main.innerText = 'AGUARDAR QUEBRA';
      main.className = 'signal-main surf';
      desc.innerText = 'Proteção Anti-Surf: Sequência longa detectada.';
      return;
    }

    // 3. SNIPER 3X (ESTRATÉGIA KTO)
    if (streak3 === 'PPP' || streak3 === 'BBB') {
      const side = streak3 === 'PPP' ? 'BANKER' : 'PLAYER';
      card.className = 'signal-card ' + side.toLowerCase();
      main.innerText = 'ENTRAR ' + side;
      main.className = 'signal-main ' + side.toLowerCase();
      desc.innerText = 'Padrão Sniper 3x identificado.';
      return;
    }

    // 4. ANALISANDO
    card.className = 'signal-card';
    main.innerText = 'ANALISANDO...';
    main.className = 'signal-main wait';
    desc.innerText = 'Monitorando mesa da Evolution...';
  }

  setInterval(update, 3000);
  update();
</script>

</body>
</html>
