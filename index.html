<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Km Dados – Bac Bo ao Vivo</title>
  <style>
    :root {
      --bg: #0a0c16;
      --card: #12152a;
      --card2: #1a1f38;
      --border: #252a4a;
      --player: #3b82f6;
      --banker: #ef4444;
      --tie: #f59e0b;
      --text: #e2e8f0;
      --muted: #64748b;
      --green: #22c55e;
      --purple: #a855f7;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      padding-bottom: 40px;
    }
    header {
      background: linear-gradient(135deg, #0f1629 0%, #1a0f3a 100%);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon { font-size: 28px; filter: drop-shadow(0 0 8px rgba(168,85,247,0.8)); }
    .logo-text {
      font-size: 20px; font-weight: 800;
      background: linear-gradient(90deg, #a855f7, #3b82f6);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .logo-sub { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
    .live-badge {
      display: flex; align-items: center; gap: 6px;
      background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.4);
      border-radius: 20px; padding: 5px 12px; font-size: 12px; font-weight: 700; color: #ef4444;
    }
    .live-dot {
      width: 7px; height: 7px; background: #ef4444; border-radius: 50%;
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.8)} }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    @keyframes popIn { 0%{transform:scale(0);opacity:0} 70%{transform:scale(1.2)} 100%{transform:scale(1);opacity:1} }

    .container { max-width: 900px; margin: 0 auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 16px; }

    .status-bar {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 10px 16px; font-size: 12px;
    }
    .status-left { display: flex; align-items: center; gap: 8px; color: var(--muted); }
    .status-ok { color: var(--green); font-weight: 600; }
    .status-err { color: var(--banker); font-weight: 600; }
    .update-timer { color: var(--purple); font-weight: 700; }

    .prediction-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 20px; padding: 24px; text-align: center;
      position: relative; overflow: hidden;
    }
    .prediction-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--purple), var(--player), var(--purple));
      background-size: 200% 100%; animation: shimmer 2s linear infinite;
    }
    .pred-label { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: var(--muted); margin-bottom: 10px; }
    .pred-main { font-size: 42px; font-weight: 900; margin: 8px 0; transition: all 0.4s ease; }
    .pred-main.player { color: var(--player); text-shadow: 0 0 30px rgba(59,130,246,0.5); }
    .pred-main.banker { color: var(--banker); text-shadow: 0 0 30px rgba(239,68,68,0.5); }
    .pred-main.tie    { color: var(--tie);    text-shadow: 0 0 30px rgba(245,158,11,0.5); }
    .pred-desc { font-size: 13px; color: var(--muted); margin-top: 6px; }

    .history-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 16px;
    }
    .hist-title { font-size: 14px; font-weight: 700; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
    .hist-list { display: flex; flex-wrap: wrap; gap: 8px; }
    .hist-item {
      width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; border: 2px solid transparent; animation: popIn 0.3s ease forwards;
    }
    .hist-item.player { background: rgba(59,130,246,0.15); color: var(--player); border-color: rgba(59,130,246,0.4); }
    .hist-item.banker { background: rgba(239,68,68,0.15); color: var(--banker); border-color: rgba(239,68,68,0.4); }
    .hist-item.tie    { background: rgba(245,158,11,0.15); color: var(--tie); border-color: rgba(245,158,11,0.4); }

    .stats-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; }
    .stat-box { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px; text-align: center; }
    .stat-val { font-size: 26px; font-weight: 800; margin-bottom: 4px; }
    .stat-lab { font-size: 11px; text-transform: uppercase; color: var(--muted); letter-spacing: 0.5px; }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <span class="logo-icon">🎲</span>
      <div>
        <div class="logo-text">Km Dados</div>
        <div class="logo-sub">Análise Bac Bo Ao Vivo</div>
      </div>
    </div>
    <div class="live-badge">
      <span class="live-dot"></span>
      AO VIVO
    </div>
  </header>

  <div class="container">
    <div class="status-bar">
      <div class="status-left">
        <span id="statusText">Sincronizando...</span>
      </div>
      <div class="update-timer">
        Próxima verificação: <span id="timerCount">3</span>s
      </div>
    </div>

    <div class="prediction-card">
      <div class="pred-label">Tendência Atual</div>
      <div class="pred-main" id="resultDisplay">—</div>
      <div class="pred-desc" id="resultDesc">Aguardando dados...</div>
    </div>

    <div class="history-card">
      <div class="hist-title">📜 Últimas Rodadas</div>
      <div class="hist-list" id="historyList"></div>
    </div>

    <div class="stats-grid">
      <div class="stat-box">
        <div class="stat-val player" id="countPlayer">0</div>
        <div class="stat-lab">Jogador</div>
      </div>
      <div class="stat-box">
        <div class="stat-val banker" id="countBanker">0</div>
        <div class="stat-lab">Banco</div>
      </div>
      <div class="stat-box">
        <div class="stat-val tie" id="countTie">0</div>
        <div class="stat-lab">Empate</div>
      </div>
    </div>
  </div>

<script>
// CONFIGURAÇÕES DE SINCRONIZAÇÃO AJUSTADAS
const CONFIG = {
  intervaloVerificacao: 3000, // 3 segundos = atualiza rápido sem perder rodadas
  maxHistorico: 30,
  tentativasReconexao: 5
};

let historico = [];
let ultimaRodadaProcessada = null;
let contadorRegressivo = 3;
let idIntervalo = null;
let tentativasFalhas = 0;

// SIMULAÇÃO / BUSCA DE DADOS (substitua pela fonte real de resultados)
async function buscarResultadoBacBo() {
  try {
    // Aqui você conecta com a fonte oficial dos resultados
    // Exemplo de dado retornado: { numeroRodada: 12345, resultado: 'player' }
    const resultadosDisponiveis = ['player', 'banker', 'tie'];
    const novoResultado = resultadosDisponiveis[Math.floor(Math.random() * 3)];
    const numeroRodada = Date.now();

    tentativasFalhas = 0;
    return { numero: numeroRodada, tipo: novoResultado, sucesso: true };
  } catch (erro) {
    tentativasFalhas++;
    return { sucesso: false, erro: erro.message };
  }
}

function adicionarAoHistorico(resultado) {
  // VERIFICA SE A RODADA JÁ EXISTE PARA NÃO DUPLICAR
  if (ultimaRodadaProcessada === resultado.numero) return false;
  
  // VERIFICA SE NÃO HÁ FALTA DE SEQUÊNCIA
  if (ultimaRodadaProcessada && resultado.numero > ultimaRodadaProcessada + 15000) {
    document.getElementById('statusText').innerHTML = '<span class="status-ok">🔄 Sincronizando rodadas perdidas...</span>';
  }

  historico.unshift(resultado.tipo);
  if (historico.length > CONFIG.maxHistorico) historico.pop();
  ultimaRodadaProcessada = resultado.numero;
  return true;
}

function atualizarInterface(novoResultado) {
  if (!novoResultado.sucesso) {
    document.getElementById('statusText').innerHTML = `<span class="status-err">⚠️ Falha na conexão (tentativa ${tentativasFalhas})</span>`;
    if (tentativasFalhas >= CONFIG.tentativasReconexao) {
      document.getElementById('statusText').innerHTML = '<span class="status-err">❌ Erro permanente - verifique a fonte de dados</span>';
    }
    return;
  }

  const foiAdicionado = adicionarAoHistorico(novoResultado);

  if (foiAdicionado) {
    document.getElementById('statusText').innerHTML = '<span class="status-ok">✅ Sincronizado 100%</span>';
    document.getElementById('resultDisplay').className = `pred-main ${novoResultado.tipo}`;
    document.getElementById('resultDisplay').innerText = novoResultado.tipo.toUpperCase();
    document.getElementById('resultDesc').innerText = 'Último resultado registrado com sucesso';
  }

  // ATUALIZA LISTA E CONTADORES
  document.getElementById('historyList').innerHTML = historico.map(item => `<div class="hist-item ${item}">${item === 'player' ? 'J' : item === 'banker' ? 'B' : 'E'}</div>`).join('');
  
  const contagem = historico.reduce((acc, val) => { acc[val]++; return acc; }, {player:0, banker:0, tie:0});
  document.getElementById('countPlayer').innerText = contagem.player;
  document.getElementById('countBanker').innerText = contagem.banker;
  document.getElementById('countTie').innerText = contagem.tie;
}

async function cicloVerificacao() {
  const dados = await buscarResultadoBacBo();
  atualizarInterface(dados);
  contadorRegressivo = 3;
}

function iniciarContador() {
  if (idIntervalo) clearInterval(idIntervalo);
  idIntervalo = setInterval(() => {
    contadorRegressivo--;
    document.getElementById('timerCount').innerText = contadorRegressivo;
    if (contadorRegressivo <= 0) cicloVerificacao();
  }, 1000);
}

// INICIALIZAÇÃO
window.addEventListener('load', () => {
  cicloVerificacao();
  iniciarContador();
});
</script>
</body>
</html>
